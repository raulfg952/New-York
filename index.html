<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NYC & Washington DC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button{outline:none;-webkit-appearance:none;appearance:none}
button:focus{outline:none}
input:focus,select:focus,textarea:focus{outline:none}
a{-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f8f7f4;
  --card:#ffffff;
  --text:#1a1a1a;
  --text2:#555;
  --text3:#999;
  --border:#e5e3de;
  --border2:#edebe8;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
h1,h2{font-family:'DM Serif Display',Georgia,serif}

/* ── HEADER ── */
.header{padding:20px 16px 12px;background:var(--card);border-bottom:1px solid var(--border)}
.header h1{font-size:22px;letter-spacing:-0.5px;margin-bottom:2px}
.header .sub{font-size:12px;color:var(--text2);margin-bottom:8px}
.hotel-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#c0392b;background:#fef3f2;border:1px solid #fecaca;border-radius:20px;padding:4px 10px}

/* ── DAY SELECTOR ── */
.day-nav{padding:14px 16px 0;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.city-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.day-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none}
.day-pills::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid #e5e3de;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;background:#fff;color:#555;outline:none;-webkit-appearance:none}
.day-pill.active{color:#fff;border-color:transparent}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);overflow-x:auto;scrollbar-width:none;position:sticky;top:69px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px;font-size:12px;font-weight:500;color:#999;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;outline:none;-webkit-appearance:none}
.tab.active{color:var(--day-color,#378ADD);border-bottom-color:var(--day-color,#378ADD)}

/* ── DAY HEADER ── */
.day-header{margin:12px 12px 0;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.day-num{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
.day-name{font-size:15px;font-weight:600;flex:1}
.day-date{font-size:12px;opacity:.75;margin-top:1px}
.city-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;flex-shrink:0}

/* ── CONTEXT BLOCK ── */
.ctx-block{margin:10px 12px 0;border-radius:10px;overflow:hidden}
.ctx-head{padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none}
.ctx-head span.title{font-size:12px;font-weight:600;flex:1}
.ctx-head span.toggle{font-size:11px;font-weight:600}
.ctx-body{padding:0 14px 14px;border-top:1px solid}
.ctx-body p{font-size:12px;line-height:1.7;margin-top:10px;opacity:.85}

/* ── PLACE CARDS ── */
.places{padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.place-card{border-radius:11px;border:1px solid #e8e8e8;background:#ffffff;overflow:hidden;cursor:pointer;transition:background .2s,border-color .15s}
.place-card.open{border-color:var(--day-color,#378ADD)}
.place-card.custom-place{border-style:dashed;border-color:var(--day-color,#378ADD);opacity:.9}
.place-head{padding:11px 13px;display:flex;align-items:center;gap:10px}
.place-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;border:1px solid}
.place-title{font-size:14px;font-weight:500;color:var(--text)}
.place-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px;align-items:center}
.badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500}
.badge-day{border:1px solid}
.badge-nearby{background:#fff8e1;color:#8b6200;border:1px solid #f0c04044;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500}
.badge-custom{background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd}
.place-hint{font-size:11px;color:var(--text3);margin-top:2px}
.place-chevron{font-size:13px;margin-left:auto;flex-shrink:0;color:var(--text3)}
.place-detail{padding:10px 13px 14px;border-top:1px solid transparent}
.place-detail p{font-size:13px;line-height:1.65;margin-top:0}
.nearby-section{margin-top:12px;padding-top:10px;border-top:1px solid var(--border2)}
.nearby-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.nearby-item{background:#f8f7f4;border-radius:8px;padding:8px 10px;margin-bottom:5px;border:1px solid var(--border)}
.nearby-item-head{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px}
.nearby-item-name{font-size:11px;font-weight:600;color:var(--text)}
.nearby-item-type{font-size:10px;padding:1px 6px;border-radius:6px;background:#fff;border:1px solid var(--border);color:var(--text2)}
.nearby-item-note{font-size:11px;color:var(--text2);line-height:1.5}
.place-actions{display:flex;gap:6px;margin-top:10px}
.btn-sm{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2)}
.btn-sm.delete{color:#e74c3c;border-color:#fecaca}

/* ── ADD PLACE BUTTON ── */
.add-place-btn{margin:0 12px 10px;width:calc(100% - 24px);padding:11px;border-radius:10px;border:1.5px dashed;background:transparent;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}

/* ── EXPENSES ── */
.exp-summary{margin:10px 12px 0;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.exp-card{border-radius:10px;padding:12px 14px}
.exp-card .label{font-size:11px;opacity:.7;margin-bottom:3px}
.exp-card .amount{font-size:22px;font-weight:600}
.exp-cats{margin:10px 12px 0;border-radius:10px;border:1px solid var(--border);overflow:hidden;background:var(--card)}
.exp-cat{padding:10px 14px;border-bottom:1px solid var(--border2)}
.exp-cat:last-child{border-bottom:none}
.exp-cat-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.exp-cat-name{font-size:13px;font-weight:500;flex:1}
.exp-cat-total{font-size:13px;font-weight:600}
.exp-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:7px;background:#f8f7f4;margin-bottom:4px}
.exp-item-desc{font-size:12px;color:var(--text2);flex:1}
.exp-item-amt{font-size:12px;font-weight:500;color:var(--text);flex-shrink:0}
.exp-empty{text-align:center;padding:32px;color:var(--text3);font-size:13px}
.add-exp-btn{margin:10px 12px;width:calc(100% - 24px);padding:11px;border-radius:10px;border:1.5px dashed;background:transparent;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}

/* ── MAP ── */
#map-container,#map-all-container{margin:10px 12px 0;border-radius:12px;overflow:hidden;border:1px solid var(--border);height:min(420px,60vh);min-height:280px}
.map-legend{margin:10px 12px 0;font-size:11px;color:var(--text3)}
.map-tip{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--border);border-radius:6px;padding:4px 9px;margin-bottom:8px}
.legend-items{display:flex;gap:10px;flex-wrap:wrap}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:9999;padding:0}
.modal-box{background:#fff;border-radius:18px 18px 0 0;padding:20px 20px 36px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
.modal-box h3{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:16px}
.modal-field{margin-bottom:13px}
.modal-field label{display:block;font-size:12px;color:#555;margin-bottom:4px;font-weight:500}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid #e0e0e0;background:#fafafa;color:#1a1a1a;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:#378ADD;background:#fff}
.modal-field textarea{resize:vertical;min-height:70px}
.modal-icon-row{display:flex;gap:8px}
.modal-icon-row input:first-child{width:48px;text-align:center;font-size:20px;flex-shrink:0;padding:10px 6px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-cancel{padding:10px 18px;border-radius:9px;border:1.5px solid #e0e0e0;background:transparent;color:#555;font-size:14px;cursor:pointer;font-family:inherit}
.btn-save{padding:10px 20px;border-radius:9px;border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-save:disabled{opacity:.4;cursor:default}
.cat-pills{display:flex;gap:6px;flex-wrap:wrap}
.cat-pill{padding:8px 12px;border-radius:20px;border:1.5px solid #e0e0e0;font-size:12px;cursor:pointer;background:#f5f5f5;color:#555;transition:background .15s,color .15s,border-color .15s;font-family:inherit;display:inline-block;-webkit-appearance:none;outline:none;user-select:none}

/* ── HIDE/SHOW ── */
.tab-content{display:none}
.tab-content.visible{display:block}

.doc-btn{background:none;border:1px solid #e0e0e0;border-radius:7px;cursor:pointer;font-size:12px;padding:4px 9px;color:#555;display:inline-flex;align-items:center;gap:4px;line-height:1;margin-top:0}
.doc-btn.has-docs{background:#fff8e1;border-color:#f0c040;color:#8b6200;font-weight:600}
.doc-list{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.doc-item{display:flex;align-items:center;gap:8px;background:#f8f7f4;border:1px solid #e5e3de;border-radius:8px;padding:7px 10px}
.doc-item-name{font-size:12px;color:#111;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-item-open{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#378ADD;font-weight:500;white-space:nowrap}
.doc-item-del{font-size:11px;padding:3px 7px;border-radius:6px;border:1px solid #fecaca;background:none;cursor:pointer;color:#e74c3c}
.doc-modal-box{background:#fff;border-radius:18px 18px 0 0;padding:20px 20px 36px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
.doc-preview{width:100%;min-height:60vh;border:none;border-radius:10px;background:#f5f5f5}

.place-check{width:24px;height:24px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s;font-size:13px;background:#fff}
.place-check.done{background:#22c55e;border-color:#22c55e;color:#fff}
.progress-bar-wrap{margin:8px 12px 0;background:#e8e8e8;border-radius:20px;height:5px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:20px;transition:width .4s ease}
.progress-label{margin:5px 12px 0;font-size:11px;color:#888;font-weight:500}
</style>
</head>
<body>

<div class="header">
  <h1>Nueva York & Washington D.C.</h1>
  <div class="sub">22 – 30 de abril · 8 días · 2 ciudades</div>
  <div class="hotel-badge">🏨 TownePlace Suites · 324 W 44th St</div>
</div>

<div class="day-nav" id="dayNav">
  <div class="city-label">🗽 Nueva York</div>
  <div class="day-pills" id="nycPills"></div>
  <div class="city-label" style="margin-top:8px">🏛 Washington D.C.</div>
  <div class="day-pills" id="dcPills"></div>
</div>

<div id="app"></div>

<!-- MODAL: Add Place -->
<div class="modal-overlay" id="addModal" style="display:none" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-box">
    <h3 id="addModalTitle">Añadir sitio</h3>
    <div class="modal-field">
      <label>Día</label>
      <select id="addDay"></select>
    </div>
    <div class="modal-field">
      <label>Nombre *</label>
      <div class="modal-icon-row">
        <input type="text" id="addIcon" placeholder="⭐" maxlength="2" value="⭐">
        <input type="text" id="addName" placeholder="Nombre del sitio">
      </div>
    </div>
    <div class="modal-field">
      <label>Descripción</label>
      <textarea id="addInfo" placeholder="Detalles, horarios, precio..."></textarea>
    </div>
    <div class="modal-field">
      <label>Etiqueta (opcional)</label>
      <input type="text" id="addBadge" placeholder="Ej: Gratis · $25 · ⚠ Reserva">
    </div>
    <div class="modal-field">
      <label>Coordenadas (opcional, para el mapa)</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="addLat" placeholder="Latitud (40.7580)">
        <input type="text" id="addLng" placeholder="Longitud (-73.985)">
      </div>
      <div style="font-size:11px;color:#999;margin-top:4px">Google Maps → clic derecho → copiar coordenadas</div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAddModal()">Cancelar</button>
      <button class="btn-save" id="addSaveBtn" onclick="savePlace()">Añadir sitio</button>
    </div>
  </div>
</div>

<!-- MODAL: Add Expense -->
<div class="modal-overlay" id="expModal" style="display:none" onclick="if(event.target===this)closeExpModal()">
  <div class="modal-box">
    <h3 id="expModalTitle">Añadir gasto</h3>
    <div class="modal-field">
      <label>Categoría</label>
      <div class="cat-pills" id="catPills"></div>
    </div>
    <div class="modal-field">
      <label>Descripción *</label>
      <input type="text" id="expDesc" placeholder="Ej: Almuerzo en Grand Central Oyster Bar">
    </div>
    <div class="modal-field" style="display:flex;gap:8px">
      <div style="flex:1">
        <label>Importe *</label>
        <input type="number" id="expAmount" step="0.01" min="0" placeholder="0.00">
      </div>
      <div style="width:100px">
        <label>Moneda</label>
        <select id="expCurrency">
          <option value="USD">USD $</option>
          <option value="EUR">EUR €</option>
        </select>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeExpModal()">Cancelar</button>
      <button class="btn-save" id="expSaveBtn" onclick="saveExpense()">Añadir</button>
    </div>
  </div>
</div>

<script>
const HOTEL = { lat: 40.7588, lng: -74.0002, n: "🏨 Hotel – TownePlace Suites", info: "324 West 44th St, Hell's Kitchen. A 7 min andando de Times Square, cerca de Broadway y Port Authority Bus Terminal." };

const DAY_CONTEXT = {
  0: {
    title: "Times Square: de plaza de periódicos a «la pantalla del mundo»",
    text: "Times Square parece el centro natural de Nueva York, pero es una construcción cultural. Fue una zona de teatros y prensa que acabó convirtiéndose en el gran escaparate luminoso del planeta. Su identidad cambió con la llegada del periódico, la publicidad, los teatros... y luego el «renacimiento» urbano de los 90 que la transformó en lo que hoy conocemos. Es casi el ejemplo perfecto de cómo Nueva York crea símbolos: una intersección se vuelve mito. Cuando lo visites de noche y de día notarás que parecen dos lugares distintos — eso no es casualidad, es la ciudad reinventándose a cada hora."
  },
  1: {
    title: "Midtown vertical: Art Déco, orgullo corporativo y el cielo como terreno",
    text: "El Midtown que recorres hoy es literalmente el capítulo en que Nueva York inventa la verticalidad. La ciudad no creció hacia arriba solo por ambición, sino por una mezcla de tecnología y economía: acero + ascensor + suelo carísimo = rascacielos. El Chrysler es el mejor ejemplo de esa época: Art Déco, elegante, casi joya — representa la «era de los titanes», empresas queriendo dejar huella en el skyline. El Empire State es el símbolo definitivo de ese impulso. Grand Central es una lección aparte: una estación diseñada como un palacio, porque en esa época viajar tenía ritual. Y el Rockefeller Center cuenta otra historia: un complejo pensado para mezclar trabajo, ocio y espectáculo — por eso es tan cinematográfico, nació para ser escenario."
  },
  2: {
    title: "11-S, Wall Street y el puerto original: la Nueva York más antigua",
    text: "Hoy pisas la Nueva York original. Antes de ser «New York» fue Nueva Ámsterdam, un puesto holandés construido para comerciar. El Distrito Financiero conserva ese espíritu aunque haya cambiado el decorado: las calles son más estrechas y torcidas que en Midtown porque son anteriores a la cuadrícula. Aquí también está el lugar donde Nueva York gestiona su historia más dolorosa: el Memorial del 11-S no intenta ocultar la herida, la convierte en forma — dos vacíos enormes que insisten en la ausencia. No es un monumento «para mirar», es un monumento para sentir. El Oculus, al lado, representa el capítulo opuesto: la reconstrucción como símbolo contemporáneo."
  },
  3: {
    title: "Brooklyn, la inmigración y los barrios en capas",
    text: "Cruzar el Brooklyn Bridge no es solo una caminata bonita: es atravesar el momento en que la ciudad se volvió una sola metrópolis. DUMBO es un ejemplo perfecto de «capas»: antes fue zona industrial, hoy es uno de los barrios más deseados de Brooklyn. Chinatown y Little Italy muestran cómo Nueva York no absorbió a los inmigrantes borrándolos, sino apilándolos: barrio sobre barrio, generación sobre generación. Chinatown creció y se expandió; Little Italy se fue encogiendo. Caminar por Canal Street o Mott Street no es solo comprar cosas — es ver cómo Nueva York cambia sin pedir permiso. La ciudad del «sueño americano» también tuvo una cara durísima: hacinamiento, trabajos agotadores... y de esa presión salió la energía que la define."
  },
  4: {
    title: "Central Park: el gran truco urbano",
    text: "Central Park parece naturaleza, pero es una de las ideas más potentes de la ciudad: fabricar un paisaje dentro de la metrópolis. En una ciudad obsesionada con el aprovechamiento del suelo, reservar un espacio gigantesco para «no construir» fue un acto de visión extraordinario. La parte histórica —y un poco incómoda— es que para crear el parque se desplazaron comunidades enteras que vivían aquí. Contarlo no estropea la visita: la hace más real. Nueva York no es solo postal; es conflicto, decisiones y consecuencias. Dentro, cada rincón tiene aura de película porque ha sido usado como símbolo de lo mismo una y otra vez: pausa, romance, misterio, infancia."
  },
  7: {
    title: "La reinvención moderna: West Village, Chelsea y el borde del río",
    text: "El West Village es el Manhattan que sobrevivió a la cuadrícula. Sus calles son curvas, diagonales, pequeñas — guardan la sensación de ciudad europea dentro de una metrópolis geométrica. Pasear por Washington Square Park y perderte por el Village es como caminar por un recuerdo. Chelsea y el High Line son el Nueva York del siglo XXI: la ciudad que recicla su pasado industrial y lo convierte en experiencia. Una vía elevada de tren se transforma en parque, paseo y galería al aire libre — urbanismo con narrativa: «esto era hierro; ahora es vida». Hudson Yards es el contraste: lo nuevo, lo brillante, lo enorme. La ciudad moviéndose entre sus dos impulsos eternos: conservar capas y construir futuro."
  }
};


const DAYS = [
  // ───── DÍA 0 ─────
  {
    id: 0, label: "Día 0", color: "#378ADD", bg: "#E6F1FB", textColor: "#0C447C",
    date: "Mié 22 abril", name: "Llegada · Midtown", city: "NYC",
    route: [[40.7588,-74.0002],[40.7505,-73.9934],[40.7484,-73.9857],[40.7580,-73.9855]],
    via: "8th Ave sur → Empire State → 7th Ave norte",
    places: [
      { n: "Madison Square Garden", lat: 40.7505, lng: -73.9934, icon: "🏟",
        info: "A 25 min andando del hotel por la 8th Ave. Inaugurado en 1968, es el pabellón deportivo más famoso del mundo — apodado «The World's Most Famous Arena». Sede permanente de los NY Knicks y los Rangers. Aquí se disputó el legendario combate Ali vs. Frazier en 1971, una de las noches más importantes del deporte del siglo XX. También escenario del primer concierto de Elvis en NY, de Sinatra, de Springsteen, de Madonna. Dato curioso: es el cuarto Madison Square Garden — los tres anteriores estaban en otros lugares de la ciudad, y ninguno estaba en Madison Square. Solo exterior.",
        badge: null,
        nearby: [{"n": "Friedman's", "type": "🍳 Brunch", "note": "450 10th Ave. Cocina americana, famoso por sus Eggs Benedict y avocado toast. 100% sin gluten."}, {"n": "Carmine's Times Square", "type": "🍝 Cena", "note": "200 W 44th St. Italiano familiar en raciones gigantes para compartir. Perfecto para grupos."}]

      { n: "Empire State Building", lat: 40.7484, lng: -73.9857, icon: "🏢",

      { n: "Grand Central Terminal", lat: 40.7534, lng: -73.9768, icon: "🚂",
        info: "Una de las estaciones más bellas del mundo, inaugurada en 1913. El Gran Salón tiene el techo verde turquesa pintado con constelaciones del zodiaco — están pintadas al revés, siguiendo la perspectiva medieval de «la vista de Dios desde el cielo». Durante décadas estuvo tan oscuro de hollín que nadie sabía de qué color era hasta que lo restauraron en los años 90. La luz natural que se filtra por las ventanas crea los haces dorados que salen en decenas de películas. En los años 60 hubo una lucha épica para salvar el edificio de la demolición — Jackie Kennedy Onassis fue la figura clave de la campaña que lo preservó. La Pennsylvania Station al lado fue demolida en 1963, un trauma tal para la ciudad que dio lugar a la Ley de Preservación de Monumentos de NY. Whispering Gallery en la planta inferior: los arcos del arquitecto valenciano Guastavino transmiten el sonido de esquina a esquina con pasmosa claridad.",

      { n: "Biblioteca Pública de Nueva York", lat: 40.7530, lng: -73.9826, icon: "📚",
        info: "Edificio Beaux-Arts de 1911 construido sobre los depósitos de agua del siglo XIX — puedes ver las rejillas en la acera alrededor del edificio. Los dos leones de mármol de la entrada — traídos desde Tennessee — se llaman Paciencia y Fortaleza, nombres que les puso el alcalde durante la Gran Depresión para recordar a los neoyorquinos lo que necesitaban para sobrevivir a la crisis. La Rose Main Reading Room mide 90 metros de largo con techos a 15 metros: es una de las salas más bellas de América. Ha aparecido en Los Cazafantasmas, El Día de Mañana y Desayuno con Diamantes — en esa película, Audrey Hepburn miraba su collar de Tiffany frente a esta fachada. Dato mágico: la sala infantil guarda los peluches originales que inspiraron a A.A. Milne para crear Winnie the Pooh — siguen en sus vitrinas desde 1987. Horario: L/J/V/S 10-18h, Ma/Mi 10-20h, D 13-17h. Visitas guiadas gratuitas L-S 11:00 y 14:00.",

      { n: "Summit One Vanderbilt", lat: 40.7528, lng: -73.9787, icon: "🌆",
        info: "RESERVA A LAS 16:00. El mirador más espectacular de Midtown, inaugurado en 2021 en los pisos 91-93 del One Vanderbilt — el cuarto edificio más alto de Nueva York (427m). La experiencia combina arte inmersivo y arquitectura: la instalación «Air» de dos pisos de espejo infinito amplifica el skyline en todas direcciones; los globos metálicos plateados de «Reflect» flotan sobre las vistas; y el ascensor exterior de cristal «Ascent» te saca literalmente al exterior a 300 metros de altura. El mejor ángulo del Empire State que existe — lo ves perfectamente enmarcado de suelo a techo desde el oeste. Desde el SUMMIT también se ve Grand Central directamente abajo, el WTC al sur y, los días claros, hasta el New Jersey Palisades. Entrada incluida en el precio.",

      { n: "Memorial del 11-S", lat: 40.7116, lng: -74.0133, icon: "🕊",
        info: "Dos fuentes enormes en las huellas exactas de las Torres Gemelas — las cascadas más grandes de América del Norte. El agua cae por las paredes y desaparece en un vacío central cuadrado: la arquitectura convierte la ausencia en forma visible. Los 2.977 nombres grabados en bronce están organizados por afinidad: familiares juntos, compañeros de trabajo juntos. Cada año, en el cumpleaños de cada víctima, los voluntarios colocan una rosa blanca en su nombre. El Survivor Tree — un peral calcinado encontrado entre los escombros, trasplantado y hoy en flor cada primavera — es el símbolo de la resiliencia de la ciudad. En el jardín del memorial también hay una escultura con historia: «The Sphere», una bola de bronce de Fritz Koenig que estaba en la plaza de las Torres Gemelas desde 1971 como símbolo de la paz mundial. Sobrevivió al derrumbe dañada pero intacta, fue trasladada a Battery Park y en 2017 devuelta al memorial. Sus abolladuras y desgarros son las marcas del 11-S. El Museo ($26) incluye la última viga recuperada y el Muro Fundacional original de 1960.",

      { n: "Federal Reserve Bank of New York", lat: 40.7074, lng: -74.0094, icon: "🏦",
        info: "Construido en 1924 en estilo neo-renacentista florentino, este edificio contiene en sus sótanos — excavados 18 metros bajo tierra en la roca sólida de Manhattan, por debajo incluso del nivel del mar — la mayor reserva de oro del planeta. Más de 6.000 toneladas de lingotes pertenecientes a 36 países distintos, entre ellos España, Francia, Alemania y docenas de bancos centrales. El oro no es propiedad americana: Estados Unidos simplemente lo custodia. Cuando un país transfiere oro a otro, los trabajadores del banco literalmente mueven lingotes de una habitación a otra del mismo sótano — sin que el oro salga nunca del edificio. Tours gratuitos con reserva previa (recreation.gov) donde puedes bajar a ver los lingotes en persona. Sin reserva, la imponente reja de hierro forjado de la entrada ya vale la foto.",

        nearby: [{"n": "Fulton Center", "type": "🏗 Hub de transporte + comercio", "note": "Fulton St, a 2 min andando. La estación de metro más moderna de NYC con una cúpula de cristal y acero de 53 metros — arquitectura espectacular. Dentro hay tiendas y cafés."}, {"n": "FDNY Engine Co. 10 / Ladder Co. 10", "type": "🚒 Cuartel de bomberos del 11-S", "note": "124 Liberty St, frente al Memorial. El cuartel más cercano a las Torres Gemelas — 6 de sus bomberos murieron el 11-S. En la pared exterior hay un relieve de bronce de 30 metros que narra el derrumbe. Se puede visitar el exterior."}, {"n": "Brookfield Place", "type": "🛍 Centro comercial de lujo", "note": "230 Vesey St, a 8 min. Centro comercial de lujo junto al Hudson con Saks Fifth Avenue, Hermès, Gucci y restaurantes con vistas al río. El atrio de palmeras es fotogénico."}]

      { n: "Trinity Church", lat: 40.7074, lng: -74.0113, icon: "⛪",
        info: "Iglesia episcopal neogótica de 1846, la tercera construida en este mismo emplazamiento desde 1697 — la primera fue destruida por los británicos durante la ocupación de Manhattan en la Guerra de Independencia. Durante 40 años fue el edificio más alto de Manhattan, y su torre era la referencia que usaban los marineros para entrar al puerto de Nueva York. En su cementerio, a pocos metros de Wall Street, está enterrado Alexander Hamilton — el primer Secretario del Tesoro y fundador del sistema bancario americano, asesinado en duelo por el Vicepresidente Aaron Burr en 1804. Hay algo deliberadamente poético en que la tumba del arquitecto del capitalismo americano esté a metros de la bolsa más importante del mundo. Gratuita.",
        badge: "Gratis" },
      { n: "Federal Hall", lat: 40.7069, lng: -74.0089, icon: "🏛",
        info: "En este lugar exacto, el 30 de abril de 1789, George Washington juró el cargo como primer presidente de los Estados Unidos ante una multitud que llenaba Wall Street. El edificio original era el primer ayuntamiento de Nueva York y la primera sede del gobierno federal americano — aquí se redactó la Declaración de Derechos (Bill of Rights). Ese edificio fue demolido. El que ves hoy (1842) es posterior, construido como aduana en estilo neoclásico con columnas dóricas de mármol. La estatua de Washington en la entrada señala el punto exacto donde prestó juramento — el mismo sitio donde, 212 años después, el humo y el polvo del 11-S lo cubrieron de ceniza. Hoy es monumento nacional gestionado por el National Park Service. Gratuito.",
        badge: "Gratis",
        nearby: [{"n": "Stone Street", "type": "🍺 Terrazas históricas", "note": "A 2 min andando. La calle más antigua del Distrito Financiero (1600s), hoy peatonal y llena de terrazas."}]
      },
      { n: "Wall Street + NYSE + Fearless Girl", lat: 40.7061, lng: -74.0089, icon: "🏛",
        info: "Wall Street toma su nombre de un muro real de madera y tierra — «de Waal» en holandés — que los colonos de Nueva Ámsterdam construyeron en 1653 para defenderse de los ingleses. Irónicamente, los ingleses tomaron la ciudad once años después sin ningún problema. Las calles torcidas e irregulares de esta zona son el único vestigio visible del plano de la ciudad colonial. El NYSE (solo exterior) es la bolsa más grande del mundo por capitalización; la bandera americana en su fachada necesita a varias personas para desplegarla. Frente a la entrada está The Fearless Girl: instalada el 7 de marzo de 2017, víspera del Día Internacional de la Mujer, por una gestora de fondos para reivindicar más mujeres en los consejos de dirección. El NYSE intentó que la quitaran; la ciudad decidió que se quedara.",
        badge: null,
        nearby: [{"n": "Stone Street", "type": "🍺 Ambiente exterior", "note": "A 3 min andando. La calle más antigua del Distrito Financiero (1600s), hoy peatonal y llena de terrazas."}, {"n": "Fraunces Tavern", "type": "🍺 Taberna histórica", "note": "54 Pearl St. Taverna de 1762 donde George Washington se despidió de sus oficiales en 1783."}]
      },
      { n: "Bowling Green + National Museum of the American Indian", lat: 40.7032, lng: -74.0135, icon: "🌿",
        info: "El parque público más antiguo de Nueva York (1733), construido sobre el punto donde, en 1626, el director de Nueva Ámsterdam Peter Minuit compró la isla de Manhattan a los indios Lenape por «el valor de 60 guilders» en cuentas de wampum — una de las transacciones más citadas (y más mal interpretadas) de la historia. En 1776, después de que Washington leyera la Declaración de Independencia, una multitud enfervorizada arrancó la estatua del rey Jorge III que presidía el parque y la fundió para hacer 42.000 balas de mosquete. La verja original de hierro forjado, con coronas reales en los postes, sigue siendo la misma de 1771 — las únicas coronas que los revolucionarios no pudieron arrancar. El edificio Alexander Hamilton Custom House de enfrente (1907), con sus figuras alegóricas de los continentes en la fachada, alberga el Museo Nacional del Indio Americano. Gratuito y extraordinario.",
        badge: "Gratis" },
      { n: "Charging Bull", lat: 40.7056, lng: -74.0134, icon: "🐂",
        info: "En la madrugada del 15 de diciembre de 1989, el escultor siciliano Arturo Di Modica llegó con una grúa, colocó este toro de 3.200 kg frente al NYSE sin ningún permiso y se marchó. La policía lo retiró horas después. Pero los medios cubrieron la historia con tanto entusiasmo que la ciudad se vio obligada a reinstalarlo definitivamente en su ubicación actual. Di Modica lo concibió como regalo a los neoyorquinos tras el crash bursátil de 1987 — «para demostrar que el pueblo americano puede salir adelante de cualquier crisis». Costó 360.000 dólares de su propio bolsillo. El toro se convirtió en uno de los símbolos más fotografiados de Nueva York sin haber pedido permiso a nadie — algo perfectamente neoyorquino.",
        badge: null,
        nearby: [{"n": "Liberty Bagels", "type": "🥯 Bagels", "note": "Junto al Charging Bull. Los bagels más recomendados de la zona."}]
      },
      { n: "Stone Street", lat: 40.7044, lng: -74.0107, icon: "🪨",
        info: "La calle más antigua de Manhattan con adoquines originales, a dos minutos del Charging Bull. En el siglo XVII se llamaba Hoogh Straet (Calle Alta) en holandés, y fue la primera calle pavimentada de Nueva Ámsterdam — los adoquines se pusieron en 1658 para no hundirse en el barro. En 1835 un incendio devastador arrasó casi todo el Distrito Financiero; las casas de ladrillo que ves hoy son la reconstrucción inmediatamente posterior, de 1836-1840. Hoy la calle es completamente peatonal y sus aceras están llenas de terrazas de bares y restaurantes que llenan la calzada histórica de mesas. Es el lugar favorito de los trabajadores de Wall Street para tomar cerveza al atardecer. Un rincón que casi ningún turista encuentra.",
        badge: "Calle más antigua · Gratis",
        nearby: [{"n": "Fraunces Tavern", "type": "🍺 Taberna 1719", "note": "54 Pearl St, a 3 min. La taberna de Washington, sigue siendo bar y restaurante."}]
      },
      { n: "Fraunces Tavern", lat: 40.7034, lng: -74.0117, icon: "🍺",
        info: "El edificio más antiguo de Manhattan en uso continuo, construido en 1719 como residencia privada del comerciante Stephen DeLancey. En 1762, Samuel Fraunces — un hombre libre de origen caribeño y africano — lo convirtió en la taberna «Queen's Head», que se convirtió en punto de reunión de los Sons of Liberty durante los años previos a la Revolución. El 4 de diciembre de 1783, nueve días después de que los últimos soldados británicos abandonaran Nueva York, George Washington reunió aquí a sus oficiales para despedirse. Los testigos lo describieron «bañado en lágrimas» mientras decía: 'Con el corazón lleno de amor y gratitud me despido ahora de vosotros'. Después les dio la mano uno a uno en silencio y se marchó caminando hacia el ferry. Entre 1785 y 1788, mientras Nueva York fue la capital del nuevo país, el edificio albergó los Departamentos de Guerra, Exteriores y Hacienda del Gobierno federal. El restaurante en la planta baja sigue operativo. El museo en los pisos superiores guarda un mechón de pelo de Washington.",
        badge: "Museo $7 · Bar activo",
        nearby: [{"n": "Stone Street", "type": "🪨 Calle histórica siglo XVII", "note": "A 3 min. La calle adoquinada más antigua de Manhattan, llena de terrazas."}]
      },
      { n: "Staten Island Ferry", lat: 40.7013, lng: -74.0133, icon: "⛴",
        info: "Ferry gratuito — uno de los mejores regalos que hace Nueva York a sus visitantes. Sale cada 15-20 min entre semana (30 min fines de semana) desde el Whitehall Terminal, trayecto de 25 minutos. El consejo de Eric, que circula por internet desde hace años: cuando subas, NO camines a la proa. Ve a la POPA y sube por las primeras escaleras. Desde el extremo trasero de la cubierta superior tendrás vistas simultáneas de Manhattan retrocediendo y la Estatua de la Libertad acercándose — la combinación perfecta. En invierno las puertas de proa están cerradas en el viaje de ida, así que solo tienes una oportunidad: aprovecha el de ida. El ferry lo opera la ciudad de Nueva York desde 1905 y transporta 70.000 personas al día. Los barcos naranja de doble proa son inconfundibles.",
        badge: "Gratis ⭐" },
      { n: "Estatua de la Libertad", lat: 40.6892, lng: -74.0445, icon: "🗽",
        info: "El símbolo más reconocible de Nueva York, con una historia de origen menos conocida. La idea no fue de un gobierno sino de un historiador francés, Édouard de Laboulaye, que la propuso en una cena privada en 1865 como regalo de la democracia francesa a la americana. La recaudación tardó 20 años: los franceses pagaron la estatua, los americanos el pedestal. El pedestal se financió con una campaña de donaciones populares liderada por Joseph Pulitzer desde su periódico, que recaudó 100.000 dólares en pequeñas aportaciones. La estructura interior de hierro es de Gustave Eiffel — el mismo que construiría su torre en París tres años después. Las 7 puntas de la corona representan los 7 mares y los 7 continentes. Las cadenas rotas a sus pies, símbolo de la abolición de la esclavería, solo se ven bien desde el aire. Para pisar la isla: ferry oficial desde Battery Park (~$24).",
        badge: "Ferry oficial ~$24" },
      { n: "Ellis Island", lat: 40.6995, lng: -74.0398, icon: "🏛",
        info: "La puerta de entrada a América para más de 12 millones de inmigrantes entre 1892 y 1954. En sus mejores años procesaba hasta 5.000 personas al día — médicos examinando ojos con un gancho de botones en busca de tracoma, inspectores marcando con tiza la ropa de los sospechosos de enfermedad, intérpretes en 30 idiomas intentando entender nombres que nunca habían oído. Muchos apellidos americanos quedaron simplificados o directamente cambiados aquí. El Grand Hall (la sala de registro) fue restaurado en los años 90 y es uno de los espacios más emotivos de Nueva York: las maletas, los documentos, las fotos de familias que apostaron todo cruzando el Atlántico. El 40% de los americanos tiene un antepasado que pasó por esta sala. El ferry para Ellis Island sale de Battery Park, mismo barco que va a la Estatua de la Libertad.",
        badge: "Incluido en ferry" },
   
      { n: "Castle Clinton", lat: 40.7034, lng: -74.0167, icon: "🏰",
        info: "El fuerte circular de arenisca roja que preside Battery Park fue construido en 1811 para defender Manhattan de los ingleses — que nunca atacaron. A lo largo del siglo XIX tuvo más vidas que ningún otro edificio de la ciudad: fue sala de conciertos donde Jenny Lind, la «Ruiseñor Sueca», cantó ante 6.000 personas en 1850; luego fue el primer acuario público de América; y entre 1855 y 1890, antes de que existiera Ellis Island, fue el Centro de Inmigración por el que pasaron 8 millones de personas — más del doble que por Ellis Island. Cada uno de esos inmigrantes pisó exactamente este suelo. Hoy es el punto de venta de tickets del ferry oficial a la Estatua de la Libertad. Monumento Nacional, gratuito.",
        badge: "Gratis · Monumento Nacional",
        nearby: [{"n": "Staten Island Ferry Terminal", "type": "⛴ Ferry gratuito", "note": "A 5 min. El mejor modo de ver la Estatua de la Libertad sin pagar."}]
      },
      { n: "Battery Park", lat: 40.7035, lng: -74.0170, icon: "🌿",
        info: "El extremo sur de Manhattan, donde la isla termina y comienza el puerto. Este trozo de tierra no existía en el siglo XVII — es tierra ganada al mar con los escombros y rellenos de 300 años de construcción. Castle Clinton está en la entrada. Pero el parque está lleno de monumentos que casi nadie busca: el East Coast Memorial, ocho bloques de granito con los nombres de los 4.601 soldados americanos muertos en el Atlántico durante la Segunda Guerra Mundial, con un águila mirando hacia Europa; el American Merchant Mariners Memorial (1991), una escultura de bronce de tres marineros — uno cayendo al agua, otro tendiendo la mano — que recuerda a los 6.700 marinos mercantes muertos en la guerra, con la particularidad de que según sube la marea el marinero del agua va quedando más sumergido; el Korean War Veterans Memorial, una placa de granito negro con los nombres de los neoyorquinos muertos en Corea (1950-1953); y el Monumento a Emma Lazarus con su famoso poema «Los nuevos colosos», cuyas últimas líneas dan la bienvenida a los inmigrantes que llegan al puerto. Castle Clinton, el fuerte circular de arenisca roja, fue sala de conciertos, acuario y el primer Centro de Inmigración de América — por él pasaron 8 millones de personas antes de que existiera Ellis Island.",
        badge: "Gratis",
        nearby: [{"n": "Pier A Harbor House", "type": "🍺 Bar con vistas", "note": "22 Battery Place. Bar en edificio histórico de 1886 a orillas del agua. Cerveza artesanal con vistas al puerto."}]
      }, ]

      { n: "City Hall (Ayuntamiento de NY)", lat: 40.7127, lng: -74.0059, icon: "🏛",
        info: "El Ayuntamiento de Nueva York (1812) es uno de los edificios públicos más antiguos de la ciudad en uso continuo. Tiene un secreto arquitectónico: su fachada norte, la que da a la ciudad, fue terminada en mármol lujoso; la fachada sur se construyó en piedra caliza barata porque en 1812 nadie imaginaba que Manhattan crecería hacia el norte — se pensaba que los ciudadanos siempre vendrían desde el sur. Desde este edificio se han anunciado todas las grandes victorias y tragedias de la ciudad. El City Hall Park fue el lugar donde Washington leyó la Declaración de Independencia a sus tropas en 1776. Está justo frente a la entrada peatonal al Puente de Brooklyn.",

      { n: "Woolworth Building", lat: 40.7121, lng: -74.0083, icon: "🏛",
        info: "El edificio más alto del mundo durante 17 años (1913-1930), pagado en efectivo — sin hipoteca, sin prestamistas — por Frank Woolworth, el rey de las tiendas de cinco centavos. Costó 13,5 millones de dólares, que Woolworth reunió níquel a níquel desde su primer comercio en Lancaster, Pennsylvania, en 1879. El estilo neogótico de 60 pisos fue apodado «la Catedral del Comercio» el día de su inauguración, cuando el presidente Woodrow Wilson pulsó un botón desde la Casa Blanca y 80.000 bombillas iluminaron la fachada — con Thomas Edison supervisando la operación. El lobby tiene techos abovedados cubiertos de mosaicos dorados y figuras de Tiffany; en las vigas hay caricaturas del propio Woolworth contando monedas y del arquitecto Cass Gilbert sosteniendo una maqueta del edificio. Para llegar a este lobby hay que reservar tour (~$20-30) porque el acceso libre desapareció en 2002. Desde fuera: la aguja de cobre verde peeking entre los rascacielos modernos es una de las mejores vistas del skyline de Lower Manhattan.",

        nearby: [{"n": "City Hall Park", "type": "🌳 Parque histórico", "note": "A 2 min. El parque más antiguo de Manhattan en uso continuo, justo frente a la entrada del Puente de Brooklyn."}]
      },
      { n: "African Burial Ground National Monument", lat: 40.7146, lng: -74.0042, icon: "🪦",
        info: "En 1991, durante la excavación de un edificio federal en 290 Broadway, los obreros encontraron restos humanos a 9 metros de profundidad. Pararon las obras. Lo que apareció fue el cementerio de esclavos más grande jamás encontrado en América del Norte: más de 15.000 africanos enterrados entre 1630 y 1795 en lo que era entonces el extrarradio de Nueva Ámsterdam, fuera de los límites de la ciudad porque la Iglesia de Trinidad les prohibía ser enterrados en suelo sagrado. Casi la mitad de los 419 esqueletos recuperados eran niños menores de 12 años — reflejo de la mortalidad brutal de la esclavitud urbana. Los restos mostraban señales inequívocas de trabajo físico extremo: literalmente murieron construyendo la ciudad. El descubrimiento hizo estallar la idea de que Nueva York era ajena a la esclavitud: en el siglo XVIII, el 20% de la población de Manhattan era esclava. El monumento fue designado por Bush en 2006. El mapa en el suelo del memorial muestra África en el centro, con rayos que apuntan hacia América, el Caribe y Europa — los vectores de la diáspora forzada. Centro de visitantes gratuito en el edificio federal.",

      { n: "South Street Seaport + Pier 17", lat: 40.7069, lng: -74.0034, icon: "⛵",
        info: "El barrio marítimo más antiguo de Manhattan, en uso como puerto desde el siglo XVII. Las calles adoquinadas del Fulton Market conservan edificios de ladrillo del siglo XIX donde los comerciantes vendían especias, tabaco y ron que llegaban de todo el mundo. En el siglo XIX, South Street era la arteria más activa del comercio mundial; aquí atracaban los clippers que unían Nueva York con China en tiempo récord. Los muelles siguen siendo el corazón del barrio: el Pier 15 es la terraza al aire libre más accesible — una plataforma de dos niveles sobre el East River con vistas directas al Puente de Brooklyn, gratuita y abierta todo el año. El Pier 16 tiene amarrados varios barcos históricos del South Street Seaport Museum, incluido el velero Wavertree de 1885 y el barco faro Ambrose — se pueden visitar. El Pier 17 es el edificio nuevo sobre el agua: una plataforma con tiendas, restaurantes y una terraza rooftop gratuita desde la que se ve el Puente de Brooklyn de frente, a la misma altura — una de las mejores vistas de la ciudad sin colas ni entrada. En el nivel inferior, frente al Pier 16, está el punto exacto donde atracaban los grandes clipper ships del siglo XIX.",
        badge: "Terraza gratis",
        nearby: [{"n": "The Fulton (Tom Colicchio)", "type": "🦞 Mariscos premium", "note": "89 South St, Pier 17. Del chef Tom Colicchio. Mariscos y cocina americana en el edificio del Seaport. Para una ocasión especial."}, {"n": "Pier 17 Food Vendors", "type": "🍔 Casual al aire libre", "note": "Varios puestos en el Pier 17 con vistas al puente. Ambiente relajado sobre el agua."}]

      { n: "Puente de Brooklyn", lat: 40.7061, lng: -73.9969, icon: "🌉",
        info: "Inaugurado en 1883, fue el primer gran puente colgante de acero del mundo. John Roebling, su diseñador, murió en un accidente de obra antes de que empezara la construcción. Su hijo Washington tomó el mando y contrajo la enfermedad de descompresión trabajando bajo el río — quedó paralítico y postrado en cama. Durante seis años dirigió la obra desde la ventana de su apartamento en Brooklyn usando binoculares, mientras su esposa Emily transmitía sus instrucciones a los ingenieros. Emily Roebling fue la primera persona en cruzar el puente terminado, en 1883. Dos semanas después de la inauguración, un rumor de que el puente se hundía desató una estampida que mató a 12 personas — para demostrar su solidez, los ingenieros hicieron desfilar 21 elefantes de circo por él. Cruzarlo a pie tarda ~30 min.",

      { n: "DUMBO — foto icónica", lat: 40.7032, lng: -73.9896, icon: "📸",
        info: "DUMBO: Down Under the Manhattan Bridge Overpass. Décadas de zona industrial; hoy uno de los barrios más cotizados de Brooklyn. La foto icónica — el arco del Puente de Manhattan enmarcado entre edificios de ladrillo rojo — está en la esquina de Water St y Washington St (Google Maps: «39-21 Washington St»). Ponerse en el centro de la calle y mirar hacia el puente. A pocos pasos está la Pebble Beach del Main Street Park — una pequeña playa de guijarros ideal para descansar con vistas al skyline. Junto a ella, el Empire Fulton Ferry Park ofrece otro ángulo espectacular del Puente de Brooklyn. Calles principales: Water St, Main St, Front St y Washington St.",

      { n: "Jane's Carousel + Time Out Market", lat: 40.7045, lng: -73.9924, icon: "🎠",
        info: "Jane's Carousel es un tiovivo de 1922 completamente restaurado, instalado en un pabellón de cristal diseñado por el arquitecto Jean Nouvel (el mismo del Museo Quai Branly de París) junto al East River. Solo $2 montar. La restauración la llevó a cabo durante 30 años Jane Walentas, quien compró el tiovivo abandonado en Ohio en 1984 — cada uno de los 48 caballos tallados a mano fue desmontado, restaurado y repintado individualmente. El pabellón de cristal se abre completamente en verano para que el tiovivo parezca flotar sobre el East River con el Puente de Brooklyn de fondo. El Time Out Market al lado es el mejor food hall de Brooklyn: los mejores chefs de la ciudad en formato mercado. En la planta 5 hay una terraza gratuita con vistas del puente — merece subir aunque no comas.",

      { n: "Brooklyn Heights Promenade", lat: 40.6971, lng: -73.9962, icon: "🌆",

      { n: "Plymouth Church", lat: 40.6989, lng: -73.9930, icon: "⛪",

      { n: "Chinatown — Canal St + Mott St", lat: 40.7159, lng: -73.9952, icon: "🏮",

      { n: "Doyers Street", lat: 40.7143, lng: -73.9981, icon: "⚔",
        info: "Una calle de apenas 60 metros con una curva pronunciada en el centro — y la historia más oscura de todo Chinatown. Doyers Street ganó el apodo de 'The Bloody Angle' (El Ángulo Sangriento) a principios del siglo XX, cuando las guerras entre bandas rivales de tongs — las organizaciones criminales chinas que controlaban el juego, el opio y la prostitución — usaban exactamente esa curva para tender emboscadas. Los rivales doblaban la esquina sin ver lo que les esperaba. La policía llegó a declarar que más hombres habían sido asesinados en esa curva que en ningún otro punto de idéntica extensión en el mundo. En 1905, la banda Hip Sing lanzó petardos al escenario del teatro chino que había aquí — el único de Nueva York — y cuatro sicarios abrieron fuego sobre 400 espectadores. Los asesinos huyeron por los túneles subterráneos que recorrían todo Chinatown, de los que hoy solo queda accesible un tramo en el número 5. Hoy la calle es apacible: barberías, restaurantes y el Nom Wah Tea Parlor (1920), el dim sum más antiguo de Nueva York. Irving Berlin tocó en la sala de reuniones del número 6 cuando era un chico pobre del East Side.",

      { n: "Little Italy — Mulberry St + Police Building", lat: 40.7246, lng: -73.9973, icon: "🇮🇹",

      { n: "Old Police Headquarters", lat: 40.7224, lng: -73.9968, icon: "🏛",
        info: "El edificio más lujoso que la policía de Nueva York construyó jamás, y también el más incongruente con su entorno: un palacio Beaux-Arts de 1909 con una cúpula de cobre verde de 5 pisos que se eleva sobre las calles de Little Italy en el 240 Centre St. Fue el cuartel general de la policía de Nueva York durante 64 años (1909-1973). Su construcción fue deliberadamente monumental — el ayuntamiento quería demostrar que el orden y la ley tenían la misma categoría arquitectónica que los bancos y los palacios gubernamentales de la 5th Ave. El interior tenía mármol de Carrara, escaleras de caoba y una cúpula pintada al fresco. En los calabozos del sótano pasaron la noche figuras como Lucky Luciano y otros capos de la mafia que tenían sus operaciones a tres manzanas de donde estaban encerrados. En 1973 la policía se mudó a un edificio moderno y el ayuntamiento vendió el palacio. Hoy es uno de los condominios más exclusivos de Manhattan — un apartamento de 3 habitaciones cuesta más de 3 millones de dólares. La ironía de que el edificio donde se procesó a miles de inmigrantes italianos sea ahora uno de los más caros del barrio no se le escapa a nadie.",

      { n: "Greene Street — Arquitectura Cast Iron", lat: 40.7233, lng: -74.0030, icon: "🏗",
        info: "Greene Street entre Canal y Houston es el bloque más concentrado de arquitectura cast-iron del mundo — más de 50 edificios de hierro fundido del siglo XIX en poco más de 5 manzanas, con las calzadas aún en adoquines originales belgas. El hierro fundido fue la revolución constructiva de los años 1850-1880: más barato y rápido que la piedra, prefabricado en moldes de fundición, permitía imitar columnas corintias, arcos y ornamentos renacentistas en masa. El número 488 de Broadway esquina con Broome — el Haughwout Building (pronunciado HA-wout), construido en 1857 — es el edificio más importante de toda la zona: fue el primer edificio del mundo en instalar un ascensor de pasajeros con sistema de seguridad, diseñado por Elisha Otis en persona por 300 dólares. Sin ese ascensor, los rascacielos no habrían sido posibles — la gente no habría subido más de 5 pisos. Mary Todd Lincoln encargó aquí la vajilla oficial de la Casa Blanca. En los años 60, cuando todo esto eran fábricas abandonadas que la ciudad quería demoler para construir una autopista elevada de 10 carriles, los artistas que vivían ilegalmente en los lofts lucharon para que se convirtiera en el Distrito Histórico que ves hoy. Jane Jacobs fue la figura clave de esa batalla.",

      { n: "SoHo", lat: 40.7243, lng: -74.0018, icon: "🏗",
        info: "South of Houston Street — el barrio de arquitectura de hierro fundido y tiendas de diseño tiene una historia en capas fascinante. En el siglo XIX era el distrito manufacturero más activo de Manhattan: fábricas de telas, imprentas, almacenes. Los edificios de cast-iron (hierro fundido) que ves son únicos en el mundo: fachadas prefabricadas de hierro que imitaban la piedra con columnas, arcos y ornamentos — más baratas y rápidas que la piedra, y teóricamente ignífugas (aunque el hierro se derrite con el calor suficiente). En los años 60 y 70 las fábricas se fueron y los artistas se mudaron: necesitaban espacios grandes, baratos y sin vecinos que se quejaran del ruido. Robert Rauschenberg, Roy Lichtenstein, Jean-Michel Basquiat vivieron y trabajaron en estos lofts. SoHo fue el centro del arte contemporáneo mundial antes de que el éxito comercial lo convirtiera en lo que ves hoy. Broadway y Prince Street son el corazón.",

      { n: "Katz's Delicatessen", lat: 40.7223, lng: -73.9873, icon: "🥪",
        info: "Abierto desde 1888 en el Lower East Side, Katz's es una reliquia viva de la Nueva York judía inmigrante que convirtió este barrio en el centro cultural del mundo ashkenazí entre 1880 y 1920. En su momento álgido, más de un millón de inmigrantes judíos vivían apiñados en el Lower East Side — la mayor concentración judía del planeta. El pastrami de Katz's se cura durante semanas, se ahúma y se corta a mano; los sándwiches pesan casi medio kilo. En la Segunda Guerra Mundial, el cartel «Send a salami to your boy in the army» hizo famoso el local en todo el país. En 1989 se filmó aquí la escena más famosa de «Cuando Harry encontró a Sally» — la mesa donde Meg Ryan fingió el orgasmo tiene una placa. La caja del establecimiento funciona con el mismo sistema de tickets de papel desde los años 40. El precio ronda los $25-30 por sándwich pero es una experiencia de historia pura. En el barrio de al lado: el Tenement Museum en Orchard Street.",

      },
      { n: "Alice in Wonderland", lat: 40.7748, lng: -73.9736, icon: "🍄",
        info: "La escultura de bronce de 1959 representa a Alicia sentada sobre una gran seta, rodeada del Sombrerero Loco, el Gato de Cheshire, la Liebre de Marzo y el Conejo Blanco. Fue donada al parque por George Delacorte, el fundador de Dell Publishing, en honor a su esposa fallecida. Es la única escultura de Central Park diseñada específicamente para que los niños trepen por ella — y lo hacen. Está junto al lago Conservatory Water, donde cada domingo de primavera y verano se celebran regatas de barcos de radiocontrol, una tradición que llevan haciendo los vecinos del Upper East Side desde 1916.",
        badge: null },
      { n: "Bow Bridge", lat: 40.7764, lng: -73.9731, icon: "🌉",
        info: "El puente de hierro fundido más romántico de Central Park, construido en 1862 para cruzar The Lake. Su forma de arco suave — como la curva de un arco de violín, de ahí el nombre — y sus ornamentos de hierro lo convierten en el puente más fotografiado del parque. Desde el centro del puente, la vista hacia el este muestra los rascacielos del Upper West Side reflejados en el agua; hacia el oeste, el Ramble y el bosque. Ha aparecido en «Cuando Harry encontró a Sally», «Kramer contra Kramer» y decenas de películas más. Es el lugar favorito de propuestas de matrimonio de todo Central Park.",
        badge: null },
      { n: "The Lake", lat: 40.7758, lng: -73.9752, icon: "🛶",
        info: "El lago más grande de Central Park, de 4 hectáreas, artificialmente creado en 1858 drenando un pantano. El Loeb Boathouse, en su orilla este, alquila barcas de remo desde 1954 — una de las tradiciones más neoyorquinas que existen. El restaurante del Boathouse es uno de los más bonitos de la ciudad, con las mesas al borde del agua mirando hacia el lago y los rascacielos al fondo. Por la orilla oeste está Strawberry Fields. Las tortugas y los patos son residentes permanentes.",
        badge: null },
      { n: "Belvedere Castle", lat: 40.7794, lng: -73.9691, icon: "🏰",
        info: "Construido en 1869 como «folly» — un edificio decorativo sin ninguna función real cuyo único propósito era dar un punto de destino a los paseantes. Su único propósito era que la gente contemplase el lago desde él. Irónicamente, hoy alberga la estación meteorológica oficial de Central Park, en funcionamiento desde 1919 — las temperaturas que escuchas en los partes del tiempo de Nueva York se miden aquí. Está en Vista Rock, el punto más alto del parque. Debajo, el Jardín de Shakespeare tiene todas las plantas y flores mencionadas en sus obras (más de 80 especies), cada una con la placa con el pasaje exacto donde aparece. Gratuito.",
        badge: "Gratis" },
      { n: "The Ramble", lat: 40.7762, lng: -73.9706, icon: "🌿",
        info: "Zona boscosa de 16 hectáreas en el corazón de Central Park, diseñada deliberadamente para que parezca un bosque antiguo e indomado — senderos sinuosos, puentes de piedra, arroyos artificiales, cuevas de roca. Es el único lugar del parque donde Manhattan desaparece completamente: rodeado de árboles no se ven rascacielos ni se oye el tráfico. Los diseñadores Olmsted y Vaux lo pensaron como un refugio de contemplación para la clase trabajadora que no podía permitirse viajes al campo. Hoy es el mejor punto de avistamiento de aves de toda la ciudad: más de 200 especies han sido registradas durante las migraciones de primavera y otoño. Los ornitólogos neoyorquinos se levantan antes del amanecer y vienen aquí.",
        badge: null,
        nearby: []
      },
      { n: "Jacqueline Kennedy Onassis Reservoir", lat: 40.7844, lng: -73.9652, icon: "💧",
        info: "El embalse de 43 hectáreas que domina el centro-norte del parque tomó el nombre de Jackie Kennedy en 1994, tras su muerte, en reconocimiento a su papel en preservar el patrimonio arquitectónico de Nueva York — fue ella quien encabezó la campaña para salvar Grand Central en los años 60. El sendero de tierra que rodea el embalse (2,4 km) es uno de los lugares para correr más famosos del mundo; los tabloides de Nueva York llevan décadas publicando fotos de famosos corriendo aquí. El agua del embalse ya no abastece la ciudad — fue reemplazado por depósitos subterráneos en los años 90 — pero el nivel del agua se mantiene artificialmente para el paisaje.",
        badge: null },
      { n: "Museo Guggenheim", lat: 40.7822, lng: -73.9590, icon: "🎨",
        info: "El museo de arte más fotogénico de Nueva York, diseñado por Frank Lloyd Wright en 1959 — su única obra en Manhattan y uno de los edificios del siglo XX más influyentes del mundo. La espiral de hormigón blanco fue tan controvertida cuando se construyó que 21 artistas firmaron una carta protestando porque las paredes inclinadas hacían imposible colgar cuadros correctamente. Wright respondió que los cuadros debían colgarse como joyas en una espiral ascendente, no en una pared plana. La colección incluye Kandinsky, Picasso, Chagall, Mondrian y la mayor colección de Paul Klee del mundo. El edificio en sí roba más protagonismo que las obras. Solo ver desde fuera es gratis y merece la foto.",
        badge: "~$30" },
      { n: "The Ravine", lat: 40.7968, lng: -73.9580, icon: "🌲",
        info: "El único bosque de Manhattan, en la parte más septentrional de Central Park — un rincón que la mayoría de los turistas nunca alcanza. Un arroyo artificial de 450 metros corre entre rocas de granito y árboles de más de 100 años; en otoño es espectacular. Fue diseñado en 1871 como una evocación de los paisajes boscosos del norte del estado de Nueva York. Está a 25 minutos andando de la entrada sur del parque. Si el tiempo acompaña y las piernas aguantan, el silencio que hay aquí — dentro de una ciudad de 8 millones de personas — es casi surrealista.",
        badge: null },
      { n: "Museo Metropolitano de Arte (The Met)", lat: 40.7794, lng: -73.9632, icon: "🖼",
        info: "El museo de arte más grande de América y uno de los cinco más visitados del mundo, fundado en 1870. Tiene más de 2 millones de obras abarcando 5.000 años de historia humana: desde una momia egipcia del año 3000 a.C. hasta Jackson Pollock; desde armaduras medievales japonesas hasta Van Gogh y Velázquez. El edificio principal en la 5th Ave fue diseñado en 1902 en estilo Beaux-Arts, pero ha crecido tanto que hoy ocupa 19 hectáreas — si intentaras ver todas las obras durante 30 segundos cada una, tardarías 18 años. La estrategia recomendada: elige 3-4 salas que te interesen y sumérgete en ellas. El Roof Garden Bar (primavera-otoño) tiene cócteles con vistas a Central Park y al skyline de Midtown — está incluido en la entrada y es uno de los mejores terrazas de Nueva York.",
        badge: "~$30 · Enorme",
        nearby: [{"n": "The Met Roof Garden Bar", "type": "🌿 Bar con vistas", "note": "En la azotea del propio museo (temporada primavera-otoño). Cócteles con vistas a Central Park y el skyline de Midtown. Incluido en la entrada."}, {"n": "Café Sabarsky (Neue Galerie)", "type": "🥐 Café vienés", "note": "1048 5th Ave. Cafetería vienesa con tarta Sacher, strudel y Wiener Schnitzel. Ambiente de Viena en Manhattan."}]
      },
      { n: "Museo Americano de Historia Natural", lat: 40.7813, lng: -73.9740, icon: "🦕",
        info: "El museo más querido por los neoyorquinos, en el Upper West Side desde 1869. 45 salas permanentes con más de 34 millones de especímenes y objetos. La sala de dinosaurios es una de las más completas del mundo; el Brontosaurus en el hall de entrada tiene el cuello alzado hacia el techo de cuatro pisos. El Planetario Rose Center (el gran cubo de cristal con la esfera dentro que ves desde la calle Central Park West) es el planetario más avanzado de América. La película «Noche en el Museo» se rodó aquí — en la película los esqueletos cobran vida; en la realidad, el edificio cierra a las 17:30 y los guardias lo dejan todo a oscuras. Pensar si merece la pena entrar dentro vs. ver solo el exterior del Planetario.",
        badge: "~$28",
        nearby: [{"n": "Daily Provisions (UWS)", "type": "☕ Bakery & café", "note": "375 Amsterdam Ave. De Danny Meyer. Famosa por sus crullers y café. Uno de los mejores desayunos del UWS."}]
      },
      { n: "Lincoln Center", lat: 40.7725, lng: -73.9836, icon: "🎼",
        info: "El mayor complejo de artes escénicas del mundo, inaugurado en 1962 en el Upper West Side. En su plaza de travertino blanco conviven tres instituciones: la Metropolitan Opera (el mejor teatro de ópera de América), la Filarmónica de Nueva York (fundada en 1842, la orquesta más antigua del hemisferio occidental) y el Ballet de la Ciudad de Nueva York. El edificio fue construido demoliendo el barrio de San Juan Hill, donde vivían 7.000 familias negras e hispanas — el mismo barrio que sirvió de inspiración para «West Side Story», filmada aquí un año antes de la demolición. La plaza con la fuente es extraordinariamente fotogénica, especialmente de noche. A veces hay actuaciones gratuitas al aire libre en verano.",
        badge: null,
        nearby: [{"n": "Café Luxembourg", "type": "🥖 Bistró francés", "note": "200 W 70th St. Bistró con boiserie y espejos, favorito de los locales del UWS desde 1983. Excelentes cócteles y steak frites."}]
      },
    ]
  },

    route: [[38.8974,-77.0069],[38.8899,-77.0091],[38.8906,-77.0046],[38.8895,-77.0353],[38.8893,-77.0502],[38.8807,-77.0365]],

      { n: "Tren a Washington · Union Station", lat: 38.8974, lng: -77.0069, icon: "🚂",
        info: "El tren Amtrak desde la estación Moynihan Train Hall (Penn Station) sale a las 7:04 AM. La estación Moynihan es el hall de entrada reformado del Farley Post Office Building, un edificio Beaux-Arts de 1912 justo al lado de Penn Station — cuando demolieron Penn Station en 1963 fue uno de los mayores crímenes arquitectónicos de la historia americana, y Moynihan es el intento de compensación. El trayecto dura unas 3,5 horas. La Union Station de Washington DC (1907) es una de las estaciones más bellas del país: techos abovedados de 30 metros, mármol de Carrara y una arquitectura que lo hace parecer más un templo romano que una estación de tren. El Capitolio está a 18 minutos andando.",
        badge: "Tren 7:04h" },
      { n: "Capitolio de los EEUU", lat: 38.8899, lng: -77.0091, icon: "🏛",
        info: "La sede del Congreso americano, construida en 1800 y ampliada varias veces, es el edificio más importante de la democracia americana. La cúpula de hierro colado — que pesa 4.000 toneladas — fue terminada durante la Guerra Civil, cuando Lincoln insistió en continuar las obras como símbolo de que la Unión seguiría en pie. En el interior, la Rotonda tiene pinturas de los Padres Fundadores y la famosa cúpula de 55 metros. Se puede visitar de forma gratuita, pero hay que reservar con meses de antelación y llegar una hora antes para los controles de seguridad. La visita incluye el Salón Nacional de las Estatuas, donde cada estado tiene dos estatuas de sus personajes más ilustres. La Corte Suprema y la Biblioteca del Congreso están a 5 minutos andando.",
        badge: "⚠ Reserva" },
      { n: "Corte Suprema de los EEUU", lat: 38.8906, lng: -77.0046, icon: "⚖️",
        info: "El tribunal más poderoso del mundo, construido en 1935 en mármol blanco de Vermont. El lema grabado sobre las columnas — «Equal Justice Under Law» — fue una concesión tardía: el arquitecto lo añadió solo después de que los jueces protestaran porque el edificio original no tenía ninguna inscripción. La fachada neoclásica fue diseñada deliberadamente para transmitir permanencia e imparcialidad. Las audiencias del pleno son públicas y gratuitas (octubre-junio), pero las colas empiezan antes del amanecer. El museo interior es gratuito y explica cómo funciona el sistema judicial americano con casos históricos: Brown vs. Board of Education, Roe vs. Wade, Bush vs. Gore.",
        badge: "Gratis" },
      { n: "Monumento a Washington", lat: 38.8895, lng: -77.0353, icon: "🗼",
        info: "El obelisco de mármol más alto del mundo: 169 metros. Tardó 40 años en construirse (1848-1884) — la construcción se interrumpió durante la Guerra Civil y el dinero escaseó varias veces. Si miras con atención la fachada, verás una línea horizontal a un tercio de la altura donde el color del mármol cambia ligeramente: es el punto donde se reanudaron las obras después de años de pausa, con mármol de una cantera diferente. El interior tiene un ascensor que sube en 70 segundos; las vistas desde arriba son las mejores del National Mall. Requiere reserva con anticipación; hay también tickets de taquilla el mismo día a primera hora.",
        badge: "Gratis" },
      { n: "Memorial de Lincoln", lat: 38.8893, lng: -77.0502, icon: "🎖",
        info: "El monumento más emotivo de Washington, construido en 1922 al final del National Mall. La estatua de Lincoln sentado mide 5,8 metros de alto — si se pusiera de pie, mediría casi 30 metros. Las palabras del Discurso de Gettysburg y el Segundo Discurso Inaugural están grabadas en las paredes laterales. Los escalones del memorial son el lugar histórico más importante del movimiento por los derechos civiles: aquí Martin Luther King pronunció el discurso «I Have a Dream» el 28 de agosto de 1963 ante 250.000 personas. Una placa en el suelo marca el escalón exacto donde King se paró. En 1939, la contralto Marian Anderson cantó aquí tras ser prohibida en el Constitution Hall por ser negra. De noche, iluminado y reflejado en el estanque espejo, es uno de los paisajes más poderosos de América.",
        badge: "Gratis",
        nearby: [{"n": "Founding Farmers (Pennsylvania Ave)", "type": "🌾 Americana farm-to-table", "note": "1924 Pennsylvania Ave NW. Cocina americana con ingredientes de granja. Uno de los favoritos de Washington."}]
      },
      { n: "Memorial de Jefferson", lat: 38.8807, lng: -77.0365, icon: "✍️",
        info: "El memorial de estilo neoclásico en la orilla del Tidal Basin, inaugurado en 1943. La rotonda circular, inspirada en el Panteón de Roma — que Jefferson conocía de sus años como embajador en París — alberga una estatua de 5,8 metros del tercer presidente. Jefferson fue el autor principal de la Declaración de Independencia a los 33 años, fundador de la Universidad de Virginia, arquitecto aficionado, inventor del arado moderno y el primer americano en llevar pasta al país (la trajo de Italia). Las frases grabadas en las paredes incluyen: «Juro sobre el altar de Dios eterna hostilidad a toda forma de tiranía sobre la mente humana». En primavera, los cerezos japoneses que rodean el Tidal Basin están en flor — el regalo del alcalde de Tokio en 1912.",
        badge: "Gratis" },
    ]
  },

      { n: "Smithsonian · Historia Natural · Diamante Hope", lat: 38.8913, lng: -77.0367, icon: "💎",
        info: "El Museo de Historia Natural del Smithsonian, gratuito como todos los museos federales. El Diamante Hope es la piedra preciosa más famosa del mundo: 45,52 quilates de diamante azul de un azul imposible, con una maldición adjunta que incluye la ejecución de María Antonieta (lo llevaba ella cuando la guillotinaron), la ruina de varias fortunas europeas y la muerte en accidente de varios de sus propietarios sucesivos. El diamante llega hasta sus actuales manos — el Smithsonian — porque el joyero Harry Winston lo donó en 1958 por correo ordinario, en una caja marrón, asegurado por 1 millón de dólares. El cartero que lo entregó llegó a decir que no sabía que llevaba nada especial.",

        info: "La residencia oficial del presidente desde 1800, cuando John Adams se mudó antes de que estuviera terminada. En 1814, durante la guerra contra los ingleses, fue incendiada — las paredes exteriores sobrevivieron ennegrecidas y fueron pintadas de blanco para tapar las marcas, lo que popularizó el nombre «Casa Blanca». Theodore Roosevelt fue el primero en llamarla oficialmente así en 1901. Tiene 132 habitaciones, 35 baños, una piscina, una bolera, un cine y una sala de situaciones subterránea. Los tours del interior requieren reserva con meses de antelación a través del congresista de tu distrito — prácticamente imposible como turista extranjero. El jardín norte (North Lawn) se puede fotografiar libremente desde la Pennsylvania Ave.",
        badge: "Gratis exterior",
        nearby: [{"n": "Old Ebbitt Grill", "type": "🦪 Taberna histórica", "note": "675 15th St NW. A 2 min de la Casa Blanca. El bar/restaurante más antiguo de Washington (1856). Ostras y burger de culto."}]
      },
      { n: "Memorial de los Veteranos de Vietnam", lat: 38.8921, lng: -77.0479, icon: "🪨",
        info: "El memorial más emocionalmente poderoso de Washington, diseñado por Maya Lin, una estudiante de arquitectura de 21 años que ganó el concurso en 1981 entre 1.421 propuestas. La idea fue polémica desde el principio — nada de héroes en mármol blanco, solo dos muros negros de granito hundiéndose en la tierra con 58.318 nombres grabados en orden cronológico de muerte. Los veteranos que sobrevivieron a la guerra quedaron devastados y divididos por su recibimiento en casa: muchos fueron insultados al volver. El memorial fue pensado para sanar esa herida. Los visitantes se acercan, buscan nombres, dejan cartas, flores, botellas de cerveza. El reflejo del visitante en el granito negro pone al que mira entre los muertos — ese efecto es completamente intencionado.",
        badge: "Gratis" },
      { n: "Cementerio Nacional de Arlington", lat: 38.8763, lng: -77.0747, icon: "🪖",
        info: "El cementerio militar más importante de América, con más de 400.000 tumbas en 253 hectáreas de colinas arboladas sobre el río Potomac. Fue creado en 1864 sobre los terrenos de la mansión del general confederado Robert E. Lee — confiscada por el ejército de la Unión al inicio de la Guerra Civil, en uno de los gestos más calculadamente simbólicos de la historia americana. La Tumba del Soldado Desconocido, con su guardia de honor 24 horas los 365 días del año, tiene el relevo de guardia cada 30 minutos en verano y cada hora en invierno — es uno de los rituales militares más solemnes del mundo. La tumba de JFK con la llama eterna y la de Jackie Kennedy Onassis están a pocos metros. La vista del Memorial Bridge y Washington desde las colinas es impresionante.",

      { n: "Tren de vuelta a Nueva York", lat: 38.8951, lng: -77.0351, icon: "🚂",
        info: "El tren sale a las 16:04 desde Union Station, llega a Penn Station NYC a las 19:24 aprox. Desde Penn Station al hotel son 18 min andando por la 8th Ave. Última noche en Nueva York — buen momento para un último paseo por Times Square.",

  },
