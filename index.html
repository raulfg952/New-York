// ── STATE ──────────────────────────────────────────────────────────────────
const CATS = [
  {id:"food",label:"Comida",icon:"🍽"},
  {id:"drinks",label:"Cafés",icon:"☕"},
  {id:"transport",label:"Transporte",icon:"🚇"},
  {id:"entry",label:"Entradas",icon:"🎟"},
  {id:"shopping",label:"Compras",icon:"🛍"},
  {id:"other",label:"Otros",icon:"💳"},
];

let activeDay = 0;
let activeTab = 'itinerary';
let openPlace = -1;
let ctxOpen = true;
let customPlaces = JSON.parse(localStorage.getItem('customPlaces')||'[]');
let expenses = JSON.parse(localStorage.getItem('expenses')||'{}');
let editingPlace = null;
let editingExp = null;
let expCat = 'food';
let maps = {};

// ── PERSIST ────────────────────────────────────────────────────────────────
function save(){
  localStorage.setItem('customPlaces', JSON.stringify(customPlaces));
  localStorage.setItem('expenses', JSON.stringify(expenses));
}

// ── INIT ───────────────────────────────────────────────────────────────────
function init(){
  buildNavPills();
  buildCatPills();
  buildAddDaySelect();
  renderDay();
  loadLeaflet();
}

function buildNavPills(){
  const nyc = document.getElementById('nycPills');
  const dc  = document.getElementById('dcPills');
  DAYS.forEach(function(d){
    const btn = document.createElement('button');
    const dayId = d.id; // capture explicitly
    btn.className = 'day-pill' + (dayId===activeDay?' active':'');
    const dayAllPlaces = d.places.concat(customPlaces.filter(cp=>cp.dayId===d.id));
    const dayVisited = dayAllPlaces.filter((p,pi)=>{
      const pidx = pi < d.places.length ? pi : 'c'+customPlaces.filter(cp=>cp.dayId===d.id)[pi-d.places.length].id;
      return isVisited(pidx, d.id);
    }).length;
    const dayTotal = dayAllPlaces.length;
    btn.textContent = dayVisited > 0 
      ? d.label + ' · ' + dayVisited + '/' + dayTotal
      : d.label;
    btn.dataset.dayId = String(dayId);
    if(dayId===activeDay){ btn.style.background = d.color; btn.style.color='#fff'; }
    btn.addEventListener('click', function(){
      activeDay = parseInt(this.dataset.dayId);
      openPlace = -1; activeTab = 'itinerary'; ctxOpen = true;
      renderDay(); updateNavPills();
    });
    (d.city==='NYC'?nyc:dc).appendChild(btn);
  });
}

function updateNavPills(){
  document.querySelectorAll('.day-pill').forEach((btn)=>{
    const dayId = parseInt(btn.dataset.dayId);
    const d = DAYS.find(x=>x.id===dayId);
    const active = d && d.id===activeDay;
    btn.classList.toggle('active',active);
    btn.style.background = active ? d.color : '';
    btn.style.color = active ? '#fff' : '';
  });
}

function buildAddDaySelect(){
  const sel = document.getElementById('addDay');
  DAYS.forEach(d=>{
    const opt=document.createElement('option');
    opt.value=d.id; opt.textContent=d.label+' – '+d.name;
    sel.appendChild(opt);
  });
}

function buildCatPills(){
  renderCatPills('catPills', activeDay);
}

function renderCatPills(containerId, dayId){
  const c = document.getElementById(containerId);
  if(!c) return;
  c.innerHTML = '';
  const d = DAYS.find(x=>x.id===dayId);
  CATS.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-pill';
    btn.textContent=cat.icon+' '+cat.label;
    applyPillStyle(btn, cat.id===expCat, d);
    btn.addEventListener('click', (function(catId){
      return function(){
        expCat = catId;
        c.querySelectorAll('.cat-pill').forEach(function(b,i){
          applyPillStyle(b, CATS[i].id===expCat, d);
        });
      };
    })(cat.id));
    c.appendChild(btn);
  });
}

function applyPillStyle(btn, active, day){
  if(active && day){
    btn.style.cssText = 'background:'+day.color+';border-color:'+day.color+';color:#fff;padding:8px 12px;border-radius:20px;border:1.5px solid;font-size:12px;cursor:pointer;font-family:inherit;display:inline-block;-webkit-appearance:none;outline:none';
  } else {
    btn.style.cssText = 'background:#f5f5f5;border-color:#e0e0e0;color:#555;padding:8px 12px;border-radius:20px;border:1.5px solid #e0e0e0;font-size:12px;cursor:pointer;font-family:inherit;display:inline-block;-webkit-appearance:none;outline:none';
  }
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderDay(){
  const day = DAYS.find(d=>d.id===activeDay);
  const ctx = DAY_CONTEXT[activeDay];
  document.documentElement.style.setProperty('--day-color', day.color);
  
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Day header
  const dh = document.createElement('div');
  dh.className='day-header';
  dh.style.cssText=`background:${day.bg};border:1px solid ${day.color}33;`;
  dh.innerHTML=`
    <div class="day-num" style="background:${day.color}">${day.id}</div>
    <div>
      <div class="day-name" style="color:${day.textColor}">${day.name}</div>
      <div class="day-date" style="color:${day.textColor}">${day.date} · ${day.via}</div>
    </div>
    <div class="city-tag" style="background:${day.city==='DC'?'#3D1F5A22':'#0C447C22'};color:${day.city==='DC'?'#6B3D8A':'#378ADD'}">
      ${day.city==='DC'?'🏛 Washington D.C.':'🗽 Nueva York'}
    </div>`;
  app.appendChild(dh);

  // Progress bar
  const allPlaces = day.places.concat(customPlaces.filter(cp=>cp.dayId===activeDay));
  const totalPlaces = allPlaces.length;
  const visitedCount = allPlaces.filter((p,i)=>{
    const idx = i < day.places.length ? i : 'c'+customPlaces.filter(cp=>cp.dayId===activeDay)[i-day.places.length].id;
    return isVisited(idx, activeDay);
  }).length;
  
  if(totalPlaces > 0){
    const pct = Math.round(visitedCount/totalPlaces*100);
    const progWrap = document.createElement('div');
    progWrap.className = 'progress-bar-wrap';
    const progFill = document.createElement('div');
    progFill.className = 'progress-bar-fill';
    progFill.style.cssText = `width:${pct}%;background:${day.color}`;
    progWrap.appendChild(progFill);
    app.appendChild(progWrap);
    
    const progLabel = document.createElement('div');
    progLabel.className = 'progress-label';
    progLabel.style.color = visitedCount === totalPlaces ? '#22c55e' : '#888';
    progLabel.textContent = visitedCount === totalPlaces
      ? `✅ Día completado — ${totalPlaces} lugares visitados`
      : `${visitedCount} de ${totalPlaces} lugares visitados`;
    app.appendChild(progLabel);
  }

  // Tabs
  const tabBar = document.createElement('div');
  tabBar.className='tabs';
  [['itinerary','📋 Itinerario'],['expenses','💰 Gastos'],['map','🗺 Mapa día'],['mapall','🌍 Total']].forEach(([id,label])=>{
    const t=document.createElement('button');
    t.className='tab'+(activeTab===id?' active':'');
    t.textContent=label;
    t.onclick=()=>{ activeTab=id; renderDay(); };
    tabBar.appendChild(t);
  });
  app.appendChild(tabBar);

  if(activeTab==='itinerary') renderItinerary(app, day, ctx);
  else if(activeTab==='expenses') renderExpenses(app, day);
  else if(activeTab==='map') renderMap(app, day, false);
  else if(activeTab==='mapall') renderMap(app, day, true);
}

// ── ITINERARY ──────────────────────────────────────────────────────────────
function renderItinerary(app, day, ctx){
  // Context block
  if(ctx){
    const cb=document.createElement('div');
    cb.className='ctx-block';
    cb.style.cssText=`background:${day.bg};border:1px solid ${day.color}44;`;
    cb.innerHTML=`
      <div class="ctx-head" onclick="ctxOpen=!ctxOpen;renderDay()">
        <span>🗺</span>
        <span class="title" style="color:${day.textColor}">${ctx.title}</span>
        <span class="toggle" style="color:${day.color}">${ctxOpen?'▲ Ocultar':'▼ Leer'}</span>
      </div>
      ${ctxOpen?`<div class="ctx-body" style="border-color:${day.color}22"><p style="color:${day.textColor}">${ctx.text}</p></div>`:''}`;
    app.appendChild(cb);
  }

  const places = document.createElement('div');
  places.className='places';

  // Built-in places
  day.places.forEach((p,i)=>{
    places.appendChild(makePlaceCard(p, i, day, false));
  });

  // Custom places
  customPlaces.filter(cp=>cp.dayId===activeDay).forEach(cp=>{
    places.appendChild(makePlaceCard(cp, 'c'+cp.id, day, true));
  });

  // Add button
  const addBtn=document.createElement('button');
  addBtn.className='add-place-btn';
  addBtn.style.cssText=`border-color:${day.color}88;color:${day.textColor}`;
  addBtn.innerHTML='<span style="font-size:18px">+</span> Añadir sitio a este día';
  addBtn.onclick=()=>openAddModal(activeDay);
  places.appendChild(addBtn);
  app.appendChild(places);
}


function nearbyBadges(nearby){
  // Extract the first emoji from each item's type field
  const counts = {};
  nearby.forEach(nb => {
    const emoji = (nb.type.match(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F)/u) || nb.type.match(/^(\S+)/)||['?'])[0];
    counts[emoji] = (counts[emoji]||0) + 1;
  });
  return Object.entries(counts)
    .map(([em,n]) => `<span style="background:#fff8e1;color:#8b6200;border:1px solid #f0c04044;font-size:10px;padding:2px 6px;border-radius:8px;font-weight:500;white-space:nowrap">${em} ${n}</span>`)
    .join('');
}

function getNearbyCategory(type){
  const t = type || '';
  const first = t.trim().charAt(0);
  // Map leading emoji to broad category
  const food = ['🍽','🍳','🥩','🥗','🍜','🍝','🌮','🥙','🌯','🥪','🍔','🍕','🥐','🍱','🦪','🦞','🥟','🍺','🍷','🥂','☕','🫖','🧁','🍮','🍦','🍪','🛶','🌾','🌽','🥬','🥯'];
  const shop = ['🛍','🛒','📚','🏗','🚒','⛴','🪨','🌳','🏚','🏙'];
  if(food.includes(first)) return {emoji: first, cat: 'food'};
  if(shop.includes(first)) return {emoji: first, cat: 'shop'};
  return {emoji: first||'📍', cat: 'other'};
}

function getNearbyBadges(nearby){
  if(!nearby||!nearby.length) return '';
  // Count by leading emoji
  const counts = {};
  nearby.forEach(nb=>{
    const {emoji} = getNearbyCategory(nb.type);
    counts[emoji] = (counts[emoji]||0)+1;
  });
  return Object.entries(counts).map(([emoji, count])=>
    `<span style="background:#fff8e1;color:#8b6200;border:1px solid #f0c04044;font-size:10px;padding:2px 6px;border-radius:8px;font-weight:500;margin-right:2px">${emoji} ${count}</span>`
  ).join('');
}

function makePlaceCard(p, idx, day, isCustom){
  const isOpen = String(openPlace) === String(idx);
  const hasNearby = p.nearby && p.nearby.length > 0;
  const visitedNow = isVisited(idx, activeDay);

  const card = document.createElement('div');
  card.style.cssText = `
    border-radius:11px;
    border:${isOpen ? '1.5px solid '+day.color : '1px solid #e8e8e8'};
    background:${isOpen ? day.bg : '#ffffff'};
    overflow:hidden;
    transition:border-color .15s, background .15s;
    margin-bottom:0;
    ${isCustom ? 'border-style:dashed;' : ''}
  `.replace(/\s+/g,' ');

  // ── HEAD ──────────────────────────────────────────────────────────────
  const head = document.createElement('div');
  head.style.cssText = 'padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none';

  // Checkbox
  const checkbox = document.createElement('div');
  checkbox.style.cssText = 'width:24px;height:24px;border-radius:50%;border:2px solid ' + (visitedNow ? '#22c55e' : '#ddd') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:13px;font-weight:700;background:' + (visitedNow ? '#22c55e' : '#fff') + ';color:#fff;transition:all .2s';
  checkbox.textContent = visitedNow ? '✓' : '';
  checkbox.addEventListener('click', function(e){
    e.stopPropagation();
    toggleVisited(idx, activeDay);
  });
  head.appendChild(checkbox);

  // Icon box
  const iconBox = document.createElement('div');
  iconBox.style.cssText = `width:34px;height:34px;border-radius:8px;flex-shrink:0;background:${day.bg};display:flex;align-items:center;justify-content:center;font-size:17px;border:1px solid ${day.color}44;${visitedNow ? 'opacity:0.45' : ''}`;
  iconBox.textContent = p.icon || '⭐';
  head.appendChild(iconBox);

  // Text column
  const textCol = document.createElement('div');
  textCol.style.cssText = 'flex:1;min-width:0';

  const title = document.createElement('div');
  title.style.cssText = `font-size:14px;font-weight:500;color:${visitedNow ? '#aaa' : (isOpen ? day.textColor : '#111111')};${visitedNow?'text-decoration:line-through':''}`;
  title.textContent = p.n;
  textCol.appendChild(title);

function renderExpenses(app, day){
  const dayExp = expenses[activeDay]||[];
  const totalDay = dayExp.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const totalTrip = Object.values(expenses).flat().reduce((s,e)=>s+(parseFloat(e.amount)||0),0);

  // Summary cards
  const summary=document.createElement('div');
  summary.className='exp-summary';
  summary.innerHTML=`
    <div class="exp-card" style="background:${day.bg};border:1px solid ${day.color}33">
      <div class="label" style="color:${day.textColor}">Total hoy</div>
      <div class="amount" style="color:${day.textColor}">$${totalDay.toFixed(2)}</div>
    </div>
    <div class="exp-card" style="background:#f8f7f4;border:1px solid #e5e3de">
      <div class="label" style="color:#999">Total viaje</div>
      <div class="amount" style="color:#1a1a1a">$${totalTrip.toFixed(2)}</div>
    </div>`;
  app.appendChild(summary);

  // By category
  const activeCats = CATS.map(c=>({
    ...c,
    items: dayExp.filter(e=>e.cat===c.id),
    total: dayExp.filter(e=>e.cat===c.id).reduce((s,e)=>s+(parseFloat(e.amount)||0),0)
  })).filter(c=>c.items.length>0);

  if(activeCats.length>0){
    const cats=document.createElement('div');
    cats.className='exp-cats';
    activeCats.forEach(cat=>{
      const cd=document.createElement('div');
      cd.className='exp-cat';
      cd.innerHTML=`<div class="exp-cat-head">
        <span style="font-size:15px">${cat.icon}</span>
        <span class="exp-cat-name">${cat.label}</span>
        <span class="exp-cat-total" style="color:${day.color}">$${cat.total.toFixed(2)}</span>
      </div>`;
      cat.items.forEach(exp=>{
        cd.innerHTML+=`<div class="exp-item">
          <span class="exp-item-desc">${exp.desc}</span>
          <span class="exp-item-amt">${exp.currency} ${parseFloat(exp.amount).toFixed(2)}</span>
          <button class="btn-sm" onclick="editExp(${exp.id})" style="font-size:10px;padding:2px 6px">✏</button>
          <button class="btn-sm delete" onclick="deleteExp(${exp.id})" style="font-size:10px;padding:2px 6px">✕</button>
        </div>`;
      });
      cats.appendChild(cd);
    });
    app.appendChild(cats);
  } else {
    const empty=document.createElement('div');
    empty.className='exp-empty';
    empty.textContent='Aún no hay gastos para este día';
    app.appendChild(empty);
  }

  const addBtn=document.createElement('button');
  addBtn.className='add-exp-btn';
  addBtn.style.cssText=`border-color:${day.color}88;color:${day.textColor}`;
  addBtn.innerHTML='<span style="font-size:18px">+</span> Añadir gasto';
  addBtn.onclick=()=>openExpModal();
  app.appendChild(addBtn);
}

// Track user location marker globally
let userLocMarker = null;
let userLocCircle = null;

function renderMap(app, day, all){
  const cid = all?'map-all-container':'map-container';
  const mc=document.createElement('div');
  mc.id=cid; mc.style.cssText='margin:10px 12px 0;border-radius:12px;overflow:hidden;border:1px solid #e5e3de;height:min(420px,60vh);min-height:280px;position:relative';
  app.appendChild(mc);

  const legend=document.createElement('div');
  legend.className='map-legend';
  legend.innerHTML=`<div class="map-tip">💡 Toca una línea para ver el tiempo de trayecto</div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
      <div class="legend-dot" style="background:#E53935;width:12px;height:12px;border-radius:3px"></div>
      <span>🏨 Hotel TownePlace Suites · 324 W 44th St</span>
    </div>
    <div class="legend-items">
      ${(all?DAYS:[day]).map(d=>`<div style="display:flex;align-items:center;gap:5px">
        <div class="legend-dot" style="background:${d.color}"></div>
        <span>${d.label}: ${d.name}</span>
      </div>`).join('')}
    </div>`;
  app.appendChild(legend);

  if(!window.L){ mc.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#999;font-size:14px">Cargando mapa...</div>'; return; }

  setTimeout(()=>{
    const mapId = all?'all':day.id;
    if(maps[mapId]){ maps[mapId].invalidateSize(); return; }
    const daysToShow = all?DAYS:[day];
    const allCoords = [];
    daysToShow.forEach(d=>{ if(d.route) d.route.forEach(c=>allCoords.push(c)); });
    allCoords.push([HOTEL.lat, HOTEL.lng]);
    
    const bounds = L.latLngBounds(allCoords);
    const m = L.map(cid, {zoomControl:true, attributionControl:false}).fitBounds(bounds, {padding:[20,20]});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
    maps[mapId] = m;

    // ── Location button ────────────────────────────────────────────────
    const locBtn = document.createElement('button');
    locBtn.className = 'map-loc-btn';
    locBtn.innerHTML = '📍 Mi ubicación';
    locBtn.addEventListener('click', function(){
      if(!navigator.geolocation){
        alert('Tu navegador no soporta geolocalización.');
        return;
      }
      locBtn.innerHTML = '⏳ Buscando...';
      locBtn.disabled = true;
      navigator.geolocation.getCurrentPosition(
        function(pos){
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          const acc = pos.coords.accuracy; // metres

          // Remove previous markers
          if(userLocMarker){ m.removeLayer(userLocMarker); }
          if(userLocCircle){ m.removeLayer(userLocCircle); }

          // Accuracy circle
          userLocCircle = L.circle([lat,lng], {
            radius: acc,
            color: '#1a73e8',
            fillColor: '#1a73e8',
            fillOpacity: 0.12,
            weight: 1.5
          }).addTo(m);

          // Position dot
          userLocMarker = L.circleMarker([lat,lng], {
            radius: 8,
            color: '#fff',
            fillColor: '#1a73e8',
            fillOpacity: 1,
            weight: 3
          }).addTo(m).bindPopup('📍 Estás aquí<br><small>Precisión: ~' + Math.round(acc) + 'm</small>').openPopup();

          m.setView([lat,lng], 16);
          locBtn.innerHTML = '📍 Mi ubicación';
          locBtn.disabled = false;
        },
        function(err){
          const msgs = {1:'Permiso denegado. Activa la ubicación en los ajustes del navegador.', 2:'No se pudo obtener la ubicación.', 3:'Tiempo de espera agotado.'};
          alert(msgs[err.code] || 'Error de geolocalización.');
          locBtn.innerHTML = '📍 Mi ubicación';
          locBtn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
      );
    });
    document.getElementById(cid).appendChild(locBtn);

    // Hotel marker
    L.marker([HOTEL.lat,HOTEL.lng],{icon:L.divIcon({className:'',html:'<div style="background:#E53935;color:white;border-radius:4px;padding:2px 6px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.4);border:1.5px solid white">🏨 Hotel</div>',iconAnchor:[0,0]})}).addTo(m);

    daysToShow.forEach(d=>{
      if(!d.route||d.route.length<2) return;
      const pl = L.polyline(d.route,{color:d.color,weight:3.5,opacity:.85}).addTo(m);
      pl.bindPopup(`<b>${d.label}</b> ${d.name}<br><small>${d.via}</small>`);
      d.places.forEach(p=>{
        if(p.lat&&p.lng){
          L.circleMarker([p.lat,p.lng],{radius:6,color:d.color,fillColor:d.color,fillOpacity:.9,weight:2}).addTo(m)
           .bindPopup(`<b>${p.icon||''} ${p.n}</b>${p.badge?'<br><small>'+p.badge+'</small>':''}`);
        }
      });
      customPlaces.filter(cp=>cp.dayId===d.id&&cp.lat&&cp.lng).forEach(cp=>{
        L.circleMarker([cp.lat,cp.lng],{radius:6,color:d.color,fillColor:'#fff',fillOpacity:1,weight:2,dashArray:'4'}).addTo(m)
         .bindPopup(`<b>${cp.n}</b><br><small>Añadido</small>`);
      });
    });
  }, 50);
}

function editCustomPlace(id){
  const cp=customPlaces.find(p=>p.id===id);
  if(!cp) return;
  editingPlace=id;
  document.getElementById('addModalTitle').textContent='Editar sitio';
  document.getElementById('addDay').value=cp.dayId;
  document.getElementById('addIcon').value=cp.icon||'⭐';
  document.getElementById('addName').value=cp.n;
  document.getElementById('addInfo').value=cp.info||'';
  document.getElementById('addBadge').value=cp.badge||'';
  document.getElementById('addLat').value=cp.lat||'';
  document.getElementById('addLng').value=cp.lng||'';

function closeAddModal(){ document.getElementById('addModal').style.display='none'; editingPlace=null; }

function savePlace(){
  const n=document.getElementById('addName').value.trim();
  if(!n) return;
  const dayId=parseInt(document.getElementById('addDay').value);
  const lat=parseFloat(document.getElementById('addLat').value);
  const lng=parseFloat(document.getElementById('addLng').value);
  const place={id:editingPlace||Date.now(),dayId,n,icon:document.getElementById('addIcon').value||'⭐',info:document.getElementById('addInfo').value,badge:document.getElementById('addBadge').value,lat:isNaN(lat)?null:lat,lng:isNaN(lng)?null:lng,nearby:[]};
  if(editingPlace) customPlaces=customPlaces.map(p=>p.id===editingPlace?place:p);
  else customPlaces.push(place);
  save(); closeAddModal(); renderDay();
}

function deleteCustomPlace(id){ customPlaces=customPlaces.filter(p=>p.id!==id); save(); openPlace=-1; renderDay(); }

// ── DOCUMENTS ────────────────────────────────────────────────────────────
let docs = {};
try { docs = JSON.parse(localStorage.getItem('placeDocs')||'{}'); } catch(e){}

// visited: { "d{dayId}_{idx}": true }
let visited = {};
try { visited = JSON.parse(localStorage.getItem('visited')||'{}'); } catch(e){}

function saveVisited(){
  localStorage.setItem('visited', JSON.stringify(visited));
}

function getVisitedKey(idx, dayId){
  return 'd' + dayId + '_' + String(idx);
}

function isVisited(idx, dayId){
  return !!visited[getVisitedKey(idx, dayId)];
}

function toggleVisited(idx, dayId){
  const k = getVisitedKey(idx, dayId);
  if(visited[k]) delete visited[k];
  else visited[k] = true;
  saveVisited();
  renderDay();
}

function saveDocs(){
  try { localStorage.setItem('placeDocs', JSON.stringify(docs)); }
  catch(e){ alert('Almacenamiento lleno. Intenta eliminar algunos documentos.'); }
}

function getPlaceKey(idx, dayId){
  return 'p_' + dayId + '_' + String(idx).replace('c','C');
}

function getPlaceDocs(idx, dayId){
  return docs[getPlaceKey(idx, dayId)] || [];
}

function addDocToPlace(idx, dayId, file){
  const key = getPlaceKey(idx, dayId);
  const reader = new FileReader();
  reader.onload = function(e){
    if(!docs[key]) docs[key] = [];
    docs[key].push({
      id: Date.now(),
      name: file.name,
      type: file.type,
      dataUrl: e.target.result
    });
    saveDocs();
    renderDay();
  };
  reader.readAsDataURL(file);
}

function deleteDoc(placeKey, docId){
  if(!docs[placeKey]) return;
  docs[placeKey] = docs[placeKey].filter(d=>d.id!==docId);
  if(docs[placeKey].length===0) delete docs[placeKey];
  saveDocs();
  renderDay();
}

  const box = document.createElement('div');
  box.className = 'doc-modal-box';
  
  const header = document.createElement('div');
  header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:14px';
  header.innerHTML = `<span style="font-size:14px;font-weight:600;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px">${doc.name}</span>`;
  
  const closeBtn = document.createElement('button');
  closeBtn.style.cssText = 'background:#f0f0f0;border:none;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-weight:500;flex-shrink:0';
  closeBtn.textContent = '✕ Cerrar';
  closeBtn.onclick = ()=> overlay.remove();
  header.appendChild(closeBtn);
  box.appendChild(header);
  
  if(doc.type === 'application/pdf'){
    const iframe = document.createElement('iframe');
    iframe.className = 'doc-preview';
    iframe.src = doc.dataUrl;
    box.appendChild(iframe);
  } else {
    const img = document.createElement('img');
    img.style.cssText = 'width:100%;border-radius:10px;display:block';
    img.src = doc.dataUrl;
    box.appendChild(img);
  }
  
  // Also offer download
  const dlBtn = document.createElement('a');
  dlBtn.href = doc.dataUrl;
  dlBtn.download = doc.name;
  dlBtn.style.cssText = 'display:block;text-align:center;margin-top:12px;font-size:13px;color:#378ADD;font-weight:500;text-decoration:none';
  dlBtn.textContent = '⬇ Descargar';
  box.appendChild(dlBtn);
  
  overlay.appendChild(box);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function triggerDocUpload(idx, dayId){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/pdf,image/*';
  input.onchange = function(){
    if(input.files[0]) addDocToPlace(idx, dayId, input.files[0]);
  };
  input.click();
}

// ── EDIT PLACE MODAL ────────────────────────────────────────────────────
// editTarget: { place, idx, day, isCustom }
let editTarget = null;

function openEditPlaceModal(p, idx, day){
  editTarget = { p, idx, day, isCustom: typeof idx === 'string' && idx.startsWith('c') };
  document.getElementById('editPlaceName').value = p.n || '';
  document.getElementById('editPlaceIcon').value = p.icon || '⭐';
  document.getElementById('editPlaceInfo').value = p.info || '';
  document.getElementById('editPlaceBadge').value = p.badge || '';
  document.getElementById('editPlaceLat').value = p.lat || '';
  document.getElementById('editPlaceLng').value = p.lng || '';
  const d2 = DAYS.find(x=>x.id===activeDay);
  const saveBtn = document.getElementById('editSaveBtn');
  if(saveBtn && d2) saveBtn.style.background = d2.color;
  document.getElementById('editPlaceModal').style.display = 'flex';
}

function closeEditPlaceModal(){
  document.getElementById('editPlaceModal').style.display = 'none';
  editTarget = null;
}

function saveEditPlace(){
  if(!editTarget) return;
  const {p, idx, day, isCustom} = editTarget;
  const newName = document.getElementById('editPlaceName').value.trim();
  if(!newName) return;
  
  p.n     = newName;
  p.icon  = document.getElementById('editPlaceIcon').value || '⭐';
  p.info  = document.getElementById('editPlaceInfo').value;
  p.badge = document.getElementById('editPlaceBadge').value || null;
  const lat = parseFloat(document.getElementById('editPlaceLat').value);
  const lng = parseFloat(document.getElementById('editPlaceLng').value);
  p.lat = isNaN(lat) ? (p.lat||null) : lat;
  p.lng = isNaN(lng) ? (p.lng||null) : lng;

  if(isCustom){
    // custom place — update in customPlaces array
    const id = parseInt(idx.replace('c',''));
    customPlaces = customPlaces.map(cp => cp.id===id ? {...cp, ...p} : cp);
    save();
  }
  // For built-in places, p is the object reference — mutation is direct
  closeEditPlaceModal();
  renderDay();
}

// ── START ──────────────────────────────────────────────────────────────────
init();
</script>
